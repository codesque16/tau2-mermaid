# Tiny GEPA demo (mermaid path only).
mode: solo
max_turns: 20

domain:
  name: toy_mermaid
  tasks: "domains/toy_mermaid/tasks_toy.json"

assistant:
  agent_type: litellm
  mermaid:
    graph: "/Users/shiladityabanerjee/Projects/tau2-mermaid/domains/toy_mermaid/AGENTS_TOY.md"
    type: http
    url: http://localhost:8000/mcp
    tools: ["goto_node"]
  model: openai/gpt-5-nano
  temperature: 0

gepa:
  evaluation_seed: 42
  max_metric_calls: 20
  parallel: true
  max_workers: 3
  train_ratio: 0.7
  reflection_minibatch_size: 2
  reflection_lm: "openai/gpt-4.1-mini"
  mermaid_candidate_dir: ".gepa/toy_mermaid_graph_candidates"
  output_section_path: "domains/toy_mermaid/role_optimized.md"
  output_mermaid_graph_path: "domains/toy_mermaid/AGENTS_TOY_optimized.md"
  objective: >
    Make the agent follow the toy SOP graph by calling goto_node one node at a time,
    producing an exact goto_node sequence match to the golden path.
  background: >
    The evaluator scores 1.0 only when the predicted goto_node path exactly equals the golden path.

