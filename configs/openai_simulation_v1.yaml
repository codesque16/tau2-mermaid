mode: solo
max_turns: 60
strict_dotenv_only: true

# Optional: ordered API keys per provider (first = primary). On 429, advance to the next key for
# the rest of the process; if a backup key fails with a non-rate-limit error, switch back to primary;
# the next 429 on primary jumps to the third key when present, otherwise the second.
# Each entry may be a literal key or an env var name (ALL_CAPS_WITH_UNDERSCORES only).
# api_key_rotation:
#   gemini: [GEMINI_API_KEY_PRIMARY, GEMINI_API_KEY_BACKUP]
#   openai: [OPENAI_API_KEY]
#   anthropic: [ANTHROPIC_API_KEY_PRIMARY, ANTHROPIC_API_KEY_SECONDARY]

domain:
  name: retail
  policy: 
    # - "gepa/examples/tau2_retail_mermaid/seed_solo_v1.md"
    # - "gepa/examples/tau2_retail_mermaid/gepa_retail_base_lite.md"
    # - "gepa/examples/tau2_retail_mermaid/gepa_retail_base_openai.md"
    # - "gepa/examples/tau2_retail_mermaid/gepa_retail_mermaid_lite.md"
    # - "gepa/examples/tau2_retail_mermaid/gepa_retail_mermaid_openai.md"
    # - "/Users/shiladityabanerjee/Projects/tau2-mermaid/results/prompt_optimizer_runs/20260324_gpt5nano_low/candidates/v01.md"
    - "/Users/shiladityabanerjee/Projects/tau2-mermaid/gepa/viz_outputs/base_gpt5nano_03-24_07-45-15/best_policy.md"
    - "/Users/shiladityabanerjee/Projects/tau2-mermaid/gepa/viz_outputs/mermaid_gpt5nano_03-24_07-46-32/best_policy.md"
  tasks: "domains/retail/tasks_solo_comms.json"
  # When true: require task evaluation_criteria.communicate_info strings to appear in assistant text (tau2-style), in addition to DB hash match.
  evaluate_communication: true
  # When true, writes one JSON transcript per task (including tool-call
  # request/response history) under `outputs/<run_id>/experiment_<n>/`.
  output_task_transcripts: true
  output_base_dir: "outputs"
  concurrency: 4
  instructions: "domains/retail/instructions.md"
  stop_mode: "first-text"
  # task_ids: [2,12,17,23,27,32,33,34,45,42,43,56,66,68,78,73,86,81,91,113,102,103]
  trials: 4
  # Master RNG seed for ``run_solo_tasks``: used only to draw one integer seed per trial; that per-trial
  # value is passed through to each LLM API call (Gemini ``GenerateContentConfig.seed``, LiteLLM/OpenAI ``seed``).
  # Omit to keep the previous default (internal base 300).
  seed: 34223423423

assistant:
  agent_type: openai
  model: 
    - gpt-5-nano
  temperature: 0
  reasoning_effort: ["low", "medium", "high"]
  mcp_tools_markdown_path: "gepa/examples/tau2_retail_mermaid/tools.md"
  mcps:
    - name: retail-tools
      type: stdio
      command: "uv run domains/retail/tools.py"
      tools:
        - "calculate"
        - "cancel_pending_order"
        - "exchange_delivered_order_items"
        - "find_user_id_by_name_zip"
        - "find_user_id_by_email"
        - "get_order_details"
        - "get_product_details"
        - "get_user_details"
        - "list_all_product_types"
        - "modify_pending_order_address"
        - "modify_pending_order_items"
        - "modify_pending_order_payment"
        - "modify_user_address"
        - "return_delivered_order_items"
        - "transfer_to_human_agents"
