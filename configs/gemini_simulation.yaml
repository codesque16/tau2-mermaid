mode: solo
max_turns: 60

# Optional: ordered API keys per provider (first = primary). On 429, advance to the next key for
# the rest of the process; if a backup key fails with a non-rate-limit error, switch back to primary;
# the next 429 on primary jumps to the third key when present, otherwise the second.
# Each entry may be a literal key or an env var name (ALL_CAPS_WITH_UNDERSCORES only).
# api_key_rotation:
#   gemini: [GEMINI_API_KEY_PRIMARY, GEMINI_API_KEY_BACKUP]
#   openai: [OPENAI_API_KEY]
#   anthropic: [ANTHROPIC_API_KEY_PRIMARY, ANTHROPIC_API_KEY_SECONDARY]

domain:
  name: retail
  policy: 
    - "domains/retail/policy_base_solo.md"
    - "domains/retail/policy_base_solo_gepa.md"
    - "domains/retail/policy_mermaid_gepa.md"
  tasks: "domains/retail/tasks_solo_comms.json"
  # When true: require task evaluation_criteria.communicate_info strings to appear in assistant text (tau2-style), in addition to DB hash match.
  evaluate_communication: true
  concurrency: 3
  instructions: "domains/retail/instructions.md"
  stop_mode: "first-text"
  task_ids: [2,12,17,23,27,32,33,34,45,42,43,56,66,68,78,73,86,81,91,113,102,103]
  trials: 4
  seed: 34223423423

assistant:
  agent_type: gemini
  model: 
    - gemini-3.1-flash-lite-preview
    - gemini-3-flash-preview
  temperature: 0
  reasoning_effort: ["low", "medium", "high"]
  mcps:
    - name: retail-tools
      type: stdio
      command: "uv run domains/retail/tools.py"
      tools:
        - "calculate"
        - "cancel_pending_order"
        - "exchange_delivered_order_items"
        - "find_user_id_by_name_zip"
        - "find_user_id_by_email"
        - "get_order_details"
        - "get_product_details"
        - "get_user_details"
        - "list_all_product_types"
        - "modify_pending_order_address"
        - "modify_pending_order_items"
        - "modify_pending_order_payment"
        - "modify_user_address"
        - "return_delivered_order_items"
        - "transfer_to_human_agents"
